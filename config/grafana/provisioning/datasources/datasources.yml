---
# datasources.yml — Grafana automatic datasource provisioning
apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1

datasources:

  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: prometheus-ds
    url: http://prometheus:9090
    isDefault: true
    version: 1
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      queryTimeout: "60s"
      incrementalQuerying: true
      incrementalQueryOverlapWindow: "10m"
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo-ds

  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: loki-ds
    url: http://loki:3100
    isDefault: false
    version: 1
    editable: false
    jsonData:
      maxLines: 5000
      timeout: "60"
      derivedFields:
        - matcherRegex: "traceID=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
          datasourceUid: tempo-ds
