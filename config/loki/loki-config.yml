---
# loki-config.yml — Grafana Loki single-binary configuration
# Optimized for small-to-medium deployments on disconnected networks.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  http_server_read_timeout: 300s
  http_server_write_timeout: 300s
  grpc_server_max_recv_msg_size: 104857600   # 100MB
  grpc_server_max_send_msg_size: 104857600   # 100MB
  log_level: info

# ── Common config ─────────────────────────────────────────────────────────────
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# ── Schema config ─────────────────────────────────────────────────────────────
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ── Storage config ────────────────────────────────────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 24h
  filesystem:
    directory: /loki/chunks

# ── Compactor (manages retention) ─────────────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# ── Limits ───────────────────────────────────────────────────────────────────
limits_config:
  # Retention: 30 days
  retention_period: 720h

  # Ingestion rate limits
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32

  # Per-stream limits
  max_streams_per_user: 10000
  max_global_streams_per_user: 10000

  # Query limits
  max_query_length: 721h       # Slightly more than 30 days
  max_query_parallelism: 32
  max_entries_limit_per_query: 50000
  max_cache_freshness_for_out_of_order_writes: 10m

  # Label limits
  max_label_names_per_series: 30
  max_label_name_length: 1024
  max_label_value_length: 4096

  # Allow out-of-order log ingestion (useful for distributed systems)
  allow_structured_metadata: true

# ── Ruler (alerting rules from Loki, optional) ───────────────────────────────
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://localhost:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# ── Query range ───────────────────────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# ── Cache ─────────────────────────────────────────────────────────────────────
chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled: true
      max_size_mb: 200
      ttl: 1h

# ── Table manager (legacy, but kept for compatibility) ────────────────────────
table_manager:
  retention_deletes_enabled: false
  retention_period: 0s

# ── Analytics ────────────────────────────────────────────────────────────────
analytics:
  reporting_enabled: false
