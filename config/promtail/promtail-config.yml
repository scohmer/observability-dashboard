---
# promtail-config.yml — Default Promtail configuration for the monitoring server itself.
# This scrapes local logs and pushes them to the Loki container.
# Per-host configs are generated by setup.sh into this same directory.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml
  sync_period: 10s

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ""
    batchwait: 1s
    batchsize: 102400
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    external_labels:
      host: monitoring-server
      environment: production

scrape_configs:

  # ── /var/log on the monitoring server ─────────────────────────────────────
  - job_name: varlog
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlog
          host: monitoring-server
          __path__: /var/log/*.log

  - job_name: varlog_subdirs
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlog
          host: monitoring-server
          __path__: /var/log/**/*.log

  # ── Docker container logs ─────────────────────────────────────────────────
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: monitoring-server
          __path__: /var/lib/docker/containers/**/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
      - json:
          expressions:
            tag: attrs.tag
          source: attrs
      - regex:
          expression: '^(?P<container_name>[^/]+)/(?P<container_id>[a-z0-9]+)$'
          source: tag
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
          container_name:
      - output:
          source: output

  # ── systemd journal ────────────────────────────────────────────────────────
  - job_name: journal
    journal:
      max_age: 12h
      labels:
        job: systemd-journal
        host: monitoring-server
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal__hostname']
        target_label: hostname
      - source_labels: ['__journal_priority_keyword']
        target_label: level
