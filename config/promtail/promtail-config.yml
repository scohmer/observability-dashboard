---
# promtail-config.yml — Default Promtail configuration for the monitoring server itself.
# This scrapes local logs and pushes them to the Loki container.
# Per-host configs are generated by setup.sh into this same directory.
#
# Container logs (Grafana, Prometheus, Loki) are captured automatically via
# the systemd journal because docker-compose.yml uses logging driver: journald.
# The journal scrape job below picks them up with container_name labelling.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /var/lib/promtail/positions.yaml
  sync_period: 10s

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ""
    batchwait: 1s
    batchsize: 102400
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    external_labels:
      host: monitoring-server
      environment: production

scrape_configs:

  # ── /var/log on the monitoring server ─────────────────────────────────────
  - job_name: varlog
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlog
          host: monitoring-server
          __path__: /var/log/*.log

  - job_name: varlog_subdirs
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlog
          host: monitoring-server
          __path__: /var/log/**/*.log

  # ── systemd journal (includes all container logs via journald driver) ──────
  - job_name: journal
    journal:
      max_age: 12h
      labels:
        job: systemd-journal
        host: monitoring-server
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal__hostname']
        target_label: hostname
      - source_labels: ['__journal_priority_keyword']
        target_label: level
      # Podman/journald container log fields
      - source_labels: ['__journal__container_name']
        target_label: container_name
      - source_labels: ['__journal__tag']
        target_label: container_tag
