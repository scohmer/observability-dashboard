---
# deploy-node-exporter.yml
# Master playbook that deploys node_exporter to Linux hosts and
# windows_exporter to Windows hosts based on inventory groups.
- name: Deploy Node Exporter to Linux hosts
  hosts: linux
  gather_facts: true
  become: true
  vars_files:
    - "{{ playbook_dir }}/../group_vars/all.yml"
  pre_tasks:
    - name: Verify target is Linux
      ansible.builtin.assert:
        that: ansible_os_family in ['RedHat', 'Debian', 'Suse', 'Archlinux', 'Alpine']
        fail_msg: "Host {{ inventory_hostname }} does not appear to be a supported Linux distribution."
        success_msg: "Host {{ inventory_hostname }} is {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Display target host info
      ansible.builtin.debug:
        msg: >
          Deploying node_exporter to {{ inventory_hostname }}
          ({{ ansible_distribution }} {{ ansible_distribution_version }},
          arch: {{ ansible_architecture }})

  roles:
    - role: node_exporter_linux

  post_tasks:
    - name: Wait for node_exporter to be reachable
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ node_exporter_port | default(9100) }}"
        timeout: 30
        state: started
      delegate_to: localhost
      become: false

    - name: Verify node_exporter metrics endpoint
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:{{ node_exporter_port | default(9100) }}/metrics"
        return_content: false
        status_code: 200
      delegate_to: localhost
      become: false
      retries: 3
      delay: 5
      register: metrics_check
      until: metrics_check.status == 200

    - name: Report success
      ansible.builtin.debug:
        msg: "node_exporter successfully deployed and responding on {{ ansible_host }}:{{ node_exporter_port | default(9100) }}"

# ---------------------------------------------------------------------------

- name: Deploy windows_exporter to Windows hosts
  hosts: windows
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../group_vars/all.yml"
  pre_tasks:
    - name: Verify target is Windows
      ansible.builtin.assert:
        that: ansible_os_family == "Windows"
        fail_msg: "Host {{ inventory_hostname }} is not a Windows host."
        success_msg: "Host {{ inventory_hostname }} is {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Display target host info
      ansible.builtin.debug:
        msg: >
          Deploying windows_exporter to {{ inventory_hostname }}
          ({{ ansible_distribution }} {{ ansible_distribution_version }})

  roles:
    - role: node_exporter_windows

  post_tasks:
    - name: Wait for windows_exporter to be reachable
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ windows_exporter_port | default(9182) }}"
        timeout: 60
        state: started
      delegate_to: localhost

    - name: Verify windows_exporter metrics endpoint
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:{{ windows_exporter_port | default(9182) }}/metrics"
        return_content: false
        status_code: 200
      delegate_to: localhost
      retries: 5
      delay: 10
      register: win_metrics_check
      until: win_metrics_check.status == 200

    - name: Report success
      ansible.builtin.debug:
        msg: "windows_exporter successfully deployed and responding on {{ ansible_host }}:{{ windows_exporter_port | default(9182) }}"
