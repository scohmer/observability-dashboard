---
# deploy-promtail.yml
# Deploys Promtail log shipper to all hosts (Linux and Windows).
- name: Deploy Promtail to Linux hosts
  hosts: linux
  gather_facts: true
  become: true
  vars_files:
    - "{{ playbook_dir }}/../group_vars/all.yml"
  pre_tasks:
    - name: Verify target is Linux
      ansible.builtin.assert:
        that: ansible_os_family in ['RedHat', 'Debian', 'Suse', 'Archlinux', 'Alpine']
        fail_msg: "Host {{ inventory_hostname }} is not a supported Linux distribution."

    - name: Display deployment target
      ansible.builtin.debug:
        msg: >
          Deploying Promtail {{ promtail_version | default('3.0.0') }} to
          {{ inventory_hostname }} ({{ ansible_distribution }})
          -> Loki: {{ loki_server }}:3100

  roles:
    - role: promtail_linux

  post_tasks:
    - name: Wait for Promtail HTTP port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ promtail_port | default(9080) }}"
        timeout: 30
        state: started
      delegate_to: localhost
      become: false

    - name: Verify Promtail ready endpoint
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:{{ promtail_port | default(9080) }}/ready"
        return_content: false
        status_code: 200
      delegate_to: localhost
      become: false
      retries: 5
      delay: 5
      register: promtail_check
      until: promtail_check.status == 200

    - name: Report success
      ansible.builtin.debug:
        msg: "Promtail successfully deployed on {{ inventory_hostname }}"

# ---------------------------------------------------------------------------

- name: Deploy Promtail to Windows hosts
  hosts: windows
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../group_vars/all.yml"
  pre_tasks:
    - name: Verify target is Windows
      ansible.builtin.assert:
        that: ansible_os_family == "Windows"
        fail_msg: "Host {{ inventory_hostname }} is not a Windows host."

    - name: Display deployment target
      ansible.builtin.debug:
        msg: >
          Deploying Promtail {{ promtail_version | default('3.0.0') }} to
          {{ inventory_hostname }} ({{ ansible_distribution }})
          -> Loki: {{ loki_server }}:3100

  roles:
    - role: promtail_windows

  post_tasks:
    - name: Wait for Promtail HTTP port on Windows
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ promtail_port | default(9080) }}"
        timeout: 60
        state: started
      delegate_to: localhost

    - name: Report success
      ansible.builtin.debug:
        msg: "Promtail successfully deployed on Windows host {{ inventory_hostname }}"
