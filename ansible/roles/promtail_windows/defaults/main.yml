---
# defaults/main.yml — promtail_windows role

# Version of Promtail to install
promtail_version: "3.0.0"

# Loki push URL
loki_url: "http://{{ loki_server }}:3100"

# Port Promtail HTTP server listens on
promtail_port: 9080

# Installation directory on the Windows host
promtail_install_dir: 'C:\Program Files\Grafana\Promtail'

# Configuration directory
promtail_config_dir: 'C:\ProgramData\promtail'

# Positions file
promtail_positions_file: 'C:\ProgramData\promtail\positions.yaml'

# Directory for offline packages on the control node
offline_packages_dir: "{{ playbook_dir }}/../offline-packages"

# Windows executable filename
promtail_exe_name: "promtail-windows-amd64.exe"

# Download URL
promtail_download_url: >-
  https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/{{ promtail_exe_name }}

# Path to offline binary on the control node
promtail_offline_src: "{{ offline_packages_dir }}/promtail/{{ promtail_exe_name }}"

# NSSM (Non-Sucking Service Manager) — used to register Promtail as a Windows service
# Download NSSM from https://nssm.cc/ for offline deployments
nssm_exe_name: "nssm.exe"
nssm_offline_src: "{{ offline_packages_dir }}/nssm/{{ nssm_exe_name }}"
nssm_install_path: 'C:\Windows\System32\nssm.exe'

# Windows service name
promtail_service_name: "Promtail"

# Windows Event Log channels to collect
promtail_windows_event_logs:
  - name: Application
    bookmark: 'C:\ProgramData\promtail\bookmark-app.xml'
  - name: System
    bookmark: 'C:\ProgramData\promtail\bookmark-sys.xml'
  - name: Security
    bookmark: 'C:\ProgramData\promtail\bookmark-sec.xml'

# IIS log path (set to empty string to disable)
promtail_iis_log_path: 'C:\inetpub\logs\LogFiles\**\*.log'

# Whether to collect IIS logs
promtail_collect_iis: true

# Windows Firewall rule name
promtail_fw_rule_name: "Allow Promtail metrics"
