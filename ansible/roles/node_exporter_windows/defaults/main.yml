---
# defaults/main.yml — node_exporter_windows role

# Version of windows_exporter to install
windows_exporter_version: "0.29.2"

# Port windows_exporter listens on
windows_exporter_port: 9182

# Metrics path
windows_exporter_metrics_path: /metrics

# Installation directory on the Windows host
windows_exporter_install_dir: 'C:\Program Files\windows_exporter'

# Directory for offline packages on the Ansible control node
offline_packages_dir: "{{ playbook_dir }}/../offline-packages"

# MSI filename
windows_exporter_msi_name: "windows_exporter-{{ windows_exporter_version }}-amd64.msi"

# Download URL (used when NOT air-gapped)
windows_exporter_download_url: >-
  https://github.com/prometheus-community/windows_exporter/releases/download/v{{ windows_exporter_version }}/{{ windows_exporter_msi_name }}

# Path to offline MSI on the control node
windows_exporter_offline_src: "{{ offline_packages_dir }}/windows_exporter/{{ windows_exporter_msi_name }}"

# Temporary path on the Windows host for the MSI
windows_exporter_tmp_path: 'C:\Windows\Temp\windows_exporter.msi'

# Collectors to enable (comma-separated string for MSI property)
# Leave empty to use defaults (cpu, cs, logical_disk, net, os, service, system, textfile)
windows_exporter_collectors: "cpu,cs,logical_disk,net,os,service,system,textfile,memory,process,tcp,iis"

# Windows Firewall rule name
windows_exporter_fw_rule_name: "Allow windows_exporter metrics"

# Service name as registered in Windows
windows_exporter_service_name: "windows_exporter"
