---
# tasks/main.yml — promtail_linux role

# ---------------------------------------------------------------------------
# Pre-flight
# ---------------------------------------------------------------------------
- name: Assert supported OS family
  ansible.builtin.assert:
    that: ansible_os_family in ['RedHat', 'Debian', 'Suse', 'Archlinux', 'Alpine']
    fail_msg: "Unsupported OS family: {{ ansible_os_family }}"

- name: Install unzip (required to extract Promtail)
  ansible.builtin.package:
    name: unzip
    state: present

- name: Create temporary directory
  ansible.builtin.file:
    path: "{{ promtail_tmp_dir }}"
    state: directory
    mode: "0755"

# ---------------------------------------------------------------------------
# User, group, and directories
# ---------------------------------------------------------------------------
- name: Create promtail system group
  ansible.builtin.group:
    name: "{{ promtail_group }}"
    system: true
    state: present

- name: Create promtail system user
  ansible.builtin.user:
    name: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    groups:
      - systemd-journal
      - adm
    append: true
    shell: /sbin/nologin
    system: true
    create_home: false
    home: /nonexistent
    comment: "Promtail log shipper service account"
    state: present
  ignore_errors: true   # groups may not exist on all distros

- name: Create promtail configuration directory
  ansible.builtin.file:
    path: "{{ promtail_config_dir }}"
    state: directory
    owner: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    mode: "0750"

- name: Create promtail positions directory
  ansible.builtin.file:
    path: "{{ promtail_positions_dir }}"
    state: directory
    owner: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    mode: "0755"

# ---------------------------------------------------------------------------
# Binary installation — offline-first strategy
# ---------------------------------------------------------------------------
- name: Check if offline zip exists on control node
  ansible.builtin.stat:
    path: "{{ promtail_offline_src }}"
  register: offline_zip
  delegate_to: localhost
  become: false

- name: "[OFFLINE] Copy Promtail zip from offline-packages to target"
  ansible.builtin.copy:
    src: "{{ promtail_offline_src }}"
    dest: "{{ promtail_tmp_dir }}/{{ promtail_compressed_name }}"
    mode: "0644"
  when: offline_zip.stat.exists

- name: "[ONLINE] Download Promtail zip from GitHub"
  ansible.builtin.get_url:
    url: "{{ promtail_download_url }}"
    dest: "{{ promtail_tmp_dir }}/{{ promtail_compressed_name }}"
    mode: "0644"
    timeout: 120
  when: not offline_zip.stat.exists

- name: Extract Promtail binary from zip
  ansible.builtin.unarchive:
    src: "{{ promtail_tmp_dir }}/{{ promtail_compressed_name }}"
    dest: "{{ promtail_tmp_dir }}"
    remote_src: true

- name: Install Promtail binary to {{ promtail_bin_dir }}
  ansible.builtin.copy:
    src: "{{ promtail_tmp_dir }}/{{ promtail_binary_name }}"
    dest: "{{ promtail_bin_dir }}/promtail"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart promtail

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "{{ promtail_tmp_dir }}"
    state: absent

# ---------------------------------------------------------------------------
# Configuration
# ---------------------------------------------------------------------------
- name: Deploy Promtail configuration file
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ promtail_config_dir }}/promtail-config.yml"
    owner: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    mode: "0640"
    validate: "{{ promtail_bin_dir }}/promtail -config.file=%s -check-syntax"
  notify: Restart promtail

# ---------------------------------------------------------------------------
# Systemd service
# ---------------------------------------------------------------------------
- name: Deploy Promtail systemd unit file
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart promtail

- name: Enable and start Promtail service
  ansible.builtin.systemd:
    name: "{{ promtail_service_name }}"
    state: started
    enabled: true
    daemon_reload: true

# ---------------------------------------------------------------------------
# Firewall
# ---------------------------------------------------------------------------
- name: Open Promtail port — firewalld
  ansible.posix.firewalld:
    port: "{{ promtail_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - promtail_manage_firewall
    - ansible_os_family == "RedHat"
  ignore_errors: true

- name: Open Promtail port — ufw
  community.general.ufw:
    rule: allow
    port: "{{ promtail_port }}"
    proto: tcp
  when:
    - promtail_manage_firewall
    - ansible_os_family == "Debian"
  ignore_errors: true

# ---------------------------------------------------------------------------
# Verification
# ---------------------------------------------------------------------------
- name: Verify Promtail service is running
  ansible.builtin.service_facts:

- name: Assert Promtail service is active
  ansible.builtin.assert:
    that: "'promtail.service' in ansible_facts.services and ansible_facts.services['promtail.service']['state'] == 'running'"
    fail_msg: "Promtail service is not running on {{ inventory_hostname }}"
    success_msg: "Promtail is running on {{ inventory_hostname }}:{{ promtail_port }}"
