---
# defaults/main.yml — promtail_linux role

# Version of Promtail to install
promtail_version: "3.0.0"

# Loki push URL — loki_server is set in group_vars/all.yml
loki_url: "http://{{ loki_server }}:3100"

# Port Promtail HTTP server listens on
promtail_port: 9080

# System user that runs Promtail
promtail_user: promtail

# System group for Promtail
promtail_group: promtail

# Installation directory for the binary
promtail_bin_dir: /usr/local/bin

# Directory for configuration
promtail_config_dir: /etc/promtail

# Positions file path (tracks log read progress)
promtail_positions_dir: /var/lib/promtail

# Directory for offline packages on the control node
offline_packages_dir: "{{ playbook_dir }}/../offline-packages"

# Architecture map
promtail_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armv7

# Derived architecture string
promtail_arch: "{{ promtail_arch_map[ansible_architecture] | default('amd64') }}"

# Binary filename (Grafana releases promtail as a compressed binary)
promtail_binary_name: "promtail-linux-{{ promtail_arch }}"
promtail_compressed_name: "promtail-linux-{{ promtail_arch }}.zip"

# Download URL
promtail_download_url: >-
  https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/{{ promtail_compressed_name }}

# Path to offline binary on the control node (can be either zip or uncompressed binary)
promtail_offline_src: "{{ offline_packages_dir }}/promtail/{{ promtail_compressed_name }}"

# Systemd service name
promtail_service_name: promtail

# Whether to manage firewall
promtail_manage_firewall: true

# Log paths to scrape
promtail_scrape_var_log: true
promtail_scrape_journal: true

# Extra scrape jobs (list of dicts, passed as-is into the promtail config)
promtail_extra_scrape_configs: []

# Temporary directory on target host
promtail_tmp_dir: /tmp/promtail_install
