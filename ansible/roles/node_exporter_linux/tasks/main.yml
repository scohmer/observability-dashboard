---
# tasks/main.yml — node_exporter_linux role

# ---------------------------------------------------------------------------
# Pre-flight checks
# ---------------------------------------------------------------------------
- name: Assert supported OS family
  ansible.builtin.assert:
    that: ansible_os_family in ['RedHat', 'Debian', 'Suse', 'Archlinux', 'Alpine']
    fail_msg: "Unsupported OS family: {{ ansible_os_family }}"

- name: Create temporary download directory
  ansible.builtin.file:
    path: "{{ node_exporter_tmp_dir }}"
    state: directory
    mode: "0755"

# ---------------------------------------------------------------------------
# User and group
# ---------------------------------------------------------------------------
- name: Create node_exporter system group
  ansible.builtin.group:
    name: "{{ node_exporter_group }}"
    system: true
    state: present

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    shell: /sbin/nologin
    system: true
    create_home: false
    home: /nonexistent
    comment: "node_exporter service account"
    state: present

# ---------------------------------------------------------------------------
# Binary installation — offline-first strategy
# ---------------------------------------------------------------------------
- name: Check if offline tarball exists on control node
  ansible.builtin.stat:
    path: "{{ node_exporter_offline_src }}"
  register: offline_tarball
  delegate_to: localhost
  become: false

- name: "[OFFLINE] Copy tarball from offline-packages to target"
  ansible.builtin.copy:
    src: "{{ node_exporter_offline_src }}"
    dest: "{{ node_exporter_tmp_dir }}/{{ node_exporter_tarball }}"
    mode: "0644"
  when: offline_tarball.stat.exists

- name: "[ONLINE] Download node_exporter tarball from GitHub"
  ansible.builtin.get_url:
    url: "{{ node_exporter_download_url }}"
    dest: "{{ node_exporter_tmp_dir }}/{{ node_exporter_tarball }}"
    mode: "0644"
    timeout: 60
  when: not offline_tarball.stat.exists

- name: Extract node_exporter tarball
  ansible.builtin.unarchive:
    src: "{{ node_exporter_tmp_dir }}/{{ node_exporter_tarball }}"
    dest: "{{ node_exporter_tmp_dir }}"
    remote_src: true
    creates: "{{ node_exporter_tmp_dir }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"

- name: Install node_exporter binary to {{ node_exporter_bin_dir }}
  ansible.builtin.copy:
    src: "{{ node_exporter_tmp_dir }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
    dest: "{{ node_exporter_bin_dir }}/node_exporter"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart node_exporter

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "{{ node_exporter_tmp_dir }}"
    state: absent

# ---------------------------------------------------------------------------
# Systemd service
# ---------------------------------------------------------------------------
- name: Deploy node_exporter systemd unit file
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start node_exporter service
  ansible.builtin.systemd:
    name: "{{ node_exporter_service_name }}"
    state: started
    enabled: true
    daemon_reload: true

# ---------------------------------------------------------------------------
# Firewall rules
# ---------------------------------------------------------------------------
- name: Open node_exporter port — firewalld (RedHat/Fedora)
  ansible.posix.firewalld:
    port: "{{ node_exporter_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  when:
    - node_exporter_manage_firewall
    - ansible_os_family == "RedHat"
  ignore_errors: true   # firewalld may not be running in containers

- name: Open node_exporter port — ufw (Debian/Ubuntu)
  community.general.ufw:
    rule: allow
    port: "{{ node_exporter_port }}"
    proto: tcp
  when:
    - node_exporter_manage_firewall
    - ansible_os_family == "Debian"
  ignore_errors: true

- name: Open node_exporter port — iptables (fallback)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ node_exporter_port }}"
    jump: ACCEPT
    comment: "node_exporter metrics"
  when:
    - node_exporter_manage_firewall
    - ansible_os_family not in ['RedHat', 'Debian']
  ignore_errors: true

# ---------------------------------------------------------------------------
# Verification
# ---------------------------------------------------------------------------
- name: Verify node_exporter is running
  ansible.builtin.service_facts:

- name: Assert node_exporter service is active
  ansible.builtin.assert:
    that: "'node_exporter.service' in ansible_facts.services and ansible_facts.services['node_exporter.service']['state'] == 'running'"
    fail_msg: "node_exporter service is not running on {{ inventory_hostname }}"
    success_msg: "node_exporter is running on {{ inventory_hostname }}:{{ node_exporter_port }}"
